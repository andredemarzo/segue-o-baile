name: Atualiza dados da Copa

# Roda na nuvem (independente de qualquer Mac). A coleta é "gated" por janela de
# jogo dentro do script, então a maioria das execuções é um no-op barato.
on:
  schedule:
    - cron: "*/15 * * * *"   # a cada ~15 min (agendador do GitHub é best-effort)
  push:                       # mudanças de código/dados publicam na hora
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      force:
        description: "Forçar coleta + deploy mesmo fora de janela de jogo (teste)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: copa-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Coleta fixtures (API da FIFA)
        env:
          COPA_PROJECT_DIR: ${{ github.workspace }}/site
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          COPA_FORCE: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '1' || '0' }}
        run: python scripts/copa_fixtures.py

      - name: Commit se os dados mudaram
        id: commit
        run: |
          if [ -n "$(git status --porcelain site/data)" ]; then
            git config user.name "copa-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add site/data
            git commit -m "auto: dados da Copa atualizados"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: GATE pré-deploy — barra regressão antes do wrangler (dado + front + cache-bust)
        # Roda em TODO deploy (auto OU push manual), sobre o site/ que VAI ao ar — fecha a brecha
        # do 30/06 (push manual de matches.json sem estrutura). Falhou aqui = NÃO deploya.
        if: steps.commit.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          set -e
          echo "→ estrutura do matches.json (104 jogos, 32 mata-mata COM cruzamento):"
          python scripts/copa_fixtures.py --validate-only
          echo "→ sintaxe do front (app.js / sw.js):"
          node --check site/app.js
          node --check site/sw.js
          echo "→ cache-bust consistente (CACHE_NAME do sw.js == ?v= do index.html):"
          SWV=$(grep -oE 'alertas-v[0-9]+' site/sw.js | head -1 | grep -oE '[0-9]+$')
          IXV=$(grep -oE 'app\.js\?v=[0-9]+' site/index.html | head -1 | grep -oE '[0-9]+$')
          if [ "$SWV" != "$IXV" ]; then echo "GATE: cache-bust inconsistente (sw=$SWV index=$IXV)"; exit 1; fi
          echo "✓ GATE passou — dado íntegro, front compila, cache-bust ok (sw=$SWV)"

      - name: Publica no Cloudflare Pages (se mudou, ou em push/disparo manual)
        if: steps.commit.outputs.changed == 'true' || github.event_name != 'schedule'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 pages deploy site --project-name=segueobaile --branch=main --commit-dirty=true
